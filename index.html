<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 压缩工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #0f0a1e 0%, #1a1033 50%, #0d1a2d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景光斑效果 */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #8b5cf6 0%, transparent 70%);
            top: -150px;
            left: -100px;
        }

        body::after {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #06b6d4 0%, transparent 70%);
            bottom: -100px;
            right: -50px;
        }

        .header {
            text-align: center;
            padding: 48px 20px 24px;
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #a78bfa, #60a5fa, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 17px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
            font-weight: 400;
        }

        .container {
            width: 100%;
            max-width: 680px;
            padding: 0 20px 60px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 32px;
            margin-bottom: 20px;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .status-bar.loading { background: rgba(255, 179, 0, 0.2); color: #ffb300; }
        .status-bar.ok { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .status-bar.error { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            flex-shrink: 0;
        }

        .status-bar.loading .status-dot { background: #ffb300; animation: pulse 1.2s infinite; }
        .status-bar.ok .status-dot { background: #22c55e; }
        .status-bar.error .status-dot { background: #ef4444; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* 拖拽上传区 */
        .dropzone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
        }

        .dropzone:hover, .dropzone.dragover {
            border-color: #a78bfa;
            background: rgba(167, 139, 250, 0.1);
        }

        .dropzone-icon {
            width: 56px; height: 56px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-size: 24px;
            font-weight: 300;
        }

        .dropzone h3 {
            font-size: 18px; font-weight: 600; color: #ffffff;
        }

        .dropzone p {
            font-size: 14px; color: rgba(255, 255, 255, 0.5); margin-top: 6px;
        }

        .dropzone input { display: none; }

        /* 文件列表 */
        .file-list {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            font-size: 14px;
        }

        .file-item-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #f43f5e, #ec4899);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700; font-size: 12px;
            flex-shrink: 0;
        }

        .file-item-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
            color: #ffffff;
        }

        .file-item-size {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            flex-shrink: 0;
        }

        .file-item-status {
            color: #a78bfa;
            font-size: 13px;
            flex-shrink: 0;
        }

        .file-item-remove {
            background: none; border: none;
            color: rgba(255, 255, 255, 0.5); cursor: pointer;
            font-size: 18px; padding: 0 4px;
            transition: color 0.2s;
        }

        .file-item-remove:hover { color: #f43f5e; }

        /* 压缩选项 */
        .quality-options {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .quality-option {
            flex: 1;
            padding: 16px 12px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
        }

        .quality-option:hover {
            border-color: #a78bfa;
            background: rgba(167, 139, 250, 0.1);
        }

        .quality-option.active {
            border-color: #a78bfa;
            background: rgba(167, 139, 250, 0.15);
        }

        .quality-option h4 {
            font-size: 15px; font-weight: 600; color: #ffffff;
        }

        .quality-option p {
            font-size: 12px; color: rgba(255, 255, 255, 0.5); margin-top: 4px;
        }

        /* 压缩按钮 */
        .btn-compress {
            display: block;
            width: 100%;
            padding: 16px;
            margin-top: 24px;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.3px;
        }

        .btn-compress:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(167, 139, 250, 0.4);
        }

        .btn-compress:active { transform: translateY(0); }

        .btn-compress:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 进度区域 */
        .progress-section {
            margin-top: 20px;
            display: none;
        }

        .progress-section.show { display: block; }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .progress-header span:first-child { color: #ffffff; font-weight: 500; }
        .progress-header span:last-child { color: rgba(255, 255, 255, 0.5); }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            border-radius: 3px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-status {
            margin-top: 8px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* 结果列表 */
        .results-section {
            display: none;
        }

        .results-section.show { display: block; }

        .results-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #ffffff;
        }

        .result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            margin-bottom: 8px;
        }

        .result-item-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
        }

        .result-item-icon.success { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .result-item-icon.fail { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        .result-item-info { flex: 1; }

        .result-item-name {
            font-weight: 600; font-size: 15px;
            color: #ffffff;
        }

        .result-item-detail {
            font-size: 13px; color: rgba(255, 255, 255, 0.5); margin-top: 4px;
        }

        .result-item-ratio {
            font-size: 18px; font-weight: 700;
            color: #22c55e; flex-shrink: 0;
        }

        .result-item-ratio.negative { color: #fbbf24; }

        .result-error {
            color: #ef4444;
            font-size: 13px;
            margin-top: 2px;
        }

        .btn-download {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .btn-download:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(167, 139, 250, 0.4);
        }

        .results-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Toast 通知 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 999;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            color: #fff;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { background: #ef4444; }
        .toast.success { background: #22c55e; }

        /* 个人信息卡片样式 */
        .profile-card {
            margin-top: 20px;
            padding: 24px !important;
        }

        .profile-content {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .profile-bio {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 12px;
        }

        .profile-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .profile-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: rgba(167, 139, 250, 0.2);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #a78bfa;
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid rgba(167, 139, 250, 0.3);
        }

        .profile-link:hover {
            background: rgba(167, 139, 250, 0.3);
            transform: translateY(-1px);
        }

        .profile-link svg {
            width: 16px;
            height: 16px;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 32px; }
            .quality-options { flex-direction: column; }
            .card { padding: 24px; }
        }

        @media (max-width: 500px) {
            .profile-content {
                flex-direction: column;
                text-align: center;
            }

            .profile-links {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="header">
    <h1>PDF 压缩工具</h1>
    <p>浏览器端处理，保护隐私 · 部署在 Vercel</p>
</div>

<div class="container">

    <!-- 状态栏 -->
    <div class="card" style="padding: 16px 24px;">
        <div class="status-bar ok" id="statusBar">
            <div class="status-dot"></div>
            <span id="statusText">就绪 · 纯浏览器处理，无需服务器</span>
        </div>
    </div>

    <!-- 上传区域 -->
    <div class="card">
        <div class="dropzone" id="dropzone">
            <div class="dropzone-icon">PDF</div>
            <h3>拖拽 PDF 文件到此处</h3>
            <p>或点击此处选择文件 · 支持批量上传</p>
            <input type="file" id="fileInput" multiple accept=".pdf">
        </div>

        <div class="file-list" id="fileList"></div>

        <!-- 压缩选项 -->
        <div class="quality-options">
            <div class="quality-option" data-quality="light" onclick="selectQuality(this)">
                <h4>轻度压缩</h4>
                <p>几乎无损 · 体积略小</p>
            </div>
            <div class="quality-option active" data-quality="standard" onclick="selectQuality(this)">
                <h4>标准压缩</h4>
                <p>良好平衡 · 推荐使用</p>
            </div>
            <div class="quality-option" data-quality="extreme" onclick="selectQuality(this)">
                <h4>强力压缩</h4>
                <p>最小体积 · 保持可读</p>
            </div>
        </div>

        <!-- 压缩按钮 -->
        <button class="btn-compress" id="btnCompress" onclick="startCompress()" disabled>
            开始压缩
        </button>

        <!-- 进度条 -->
        <div class="progress-section" id="progressSection">
            <div class="progress-header">
                <span id="progressLabel">正在压缩...</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-status" id="progressStatus">准备中...</div>
        </div>
    </div>

    <!-- 结果区域 -->
    <div class="results-section" id="resultsSection">
        <div class="card">
            <div class="results-title" id="resultsTitle">压缩完成</div>
            <div id="resultsList"></div>
            <div class="results-footer" id="resultsFooter"></div>
        </div>
    </div>

    <!-- 个人信息 -->
    <div class="card profile-card">
        <div class="profile-content">
            <img src="assets/avatar.png" alt="Avatar" class="profile-avatar">
            <div class="profile-info">
                <h3 class="profile-name">Liu Wei</h3>
                <p class="profile-bio">持续学习，不断精进</p>
                <div class="profile-links">
                    <a href="https://github.com/bobbyreader" target="_blank" class="profile-link">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                        GitHub
                    </a>
                    <a href="#" class="profile-link license-link">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm-1.25 17.292l-4.5-4.364 1.857-1.858 2.643 2.506 5.643-5.784 1.857 1.857-7.5 7.643z"/></svg>
                        Free Forever
                    </a>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
